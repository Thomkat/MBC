# no @package

base_model: 'distilgpt2'
tokenizer_name_base_model: 'gpt2'

amortization_network: 't5-small'
question_encoder: 't5-small'
tokenizer_name_amort: 't5-small'

train_update_batch_size: 16
val_update_batch_size: 24
grad_acc_steps: 4

token_dim: null
num_virtual_tokens: 12
layer_num_virtual_tokens: 2

# Codebook config
vq_num_codes: 512
vq_commitment_cost: 0.25
vq_lambda: 1.0

# KV-LoRA for base LM (last-N layers)
enable_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_last_n_layers: 6

num_cross_attention_blocks: 4

hierarchical_aggregation: False
hierarchical_agg_M: 16
backprop_drop: 1.0

# Parameters for online adaptation / evaluation (not training)
eval_amort_comp_batch_size: 16 # Batch size for amortization & compression of contexts
eval_generation_batch_size: 1 # Batch size for aggregation and generation of answers from queries
num_beams: 12
num_beam_groups: 4
diversity_penalty: 10.0